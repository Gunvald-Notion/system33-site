        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

        .track-link.active{border-color:var(--accent);color:var(--accent);background:rgba(167,139,250,.08)}
        .section{padding:32px 0 64px}
        .section-label{font-size:.75rem;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:24px}

        .question-tag{display:inline-block;padding:4px 12px;border:1px solid var(--border);border-radius:100px;font-size:.7rem;color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:16px}

        .option-btn{text-align:left;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;cursor:pointer;font-family:inherit;font-size:.95rem;color:var(--text-primary);transition:background .15s,border-color .15s;line-height:1.45}

        .next-btn:hover{opacity:.85}
        .results-score{text-align:center;padding:16px 0 24px}
        .results-score-number{font-size:3rem;font-weight:700;letter-spacing:-.03em;margin-bottom:6px}
        .results-score-label{font-size:.9rem;color:var(--text-secondary)}
        .squares-grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:16px 0 32px}

        .square.right{background:rgba(34,197,94,.7)}.square.wrong{background:rgba(239,68,68,.7)}
        .chart-container{margin:24px 0;padding:20px;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;text-align:center}
        .chart-container svg{max-width:100%;height:auto}
        .results-actions{display:flex;flex-direction:column;gap:10px;margin-top:16px}
        .btn-secondary{background:transparent;color:var(--text-primary);border:1px solid var(--border);border-radius:10px;padding:14px;font-family:inherit;font-size:.95rem;font-weight:500;cursor:pointer;transition:background .2s}
        .btn-secondary:hover{background:rgba(228,228,231,.04)}
        .btn-shuffle{background:transparent;color:var(--text-secondary);border:1px solid var(--border);border-radius:10px;padding:12px;font-family:inherit;font-size:.85rem;font-weight:500;cursor:pointer;transition:background .2s;margin-top:16px}
        .btn-shuffle:hover{background:rgba(228,228,231,.04)}
        footer{padding:32px 0;border-top:1px solid var(--border);font-size:.8rem;color:var(--text-muted);text-align:center}
        footer a{color:var(--text-secondary)}
        .hidden{display:none!important}
        @media(max-width:480px){.hero{padding:32px 0 24px}.section{padding:24px 0 48px}.chapter-card{padding:18px 20px}.question-text{font-size:1.05rem}.option-btn{font-size:.92rem;padding:12px 16px}}
    </style>

<script>
const TIERS=[{id:"Primordial",name:"Tier 0 \u2014 Primordial",desc:"=, +/\u2212, \u00d7/\u00f7, \u03a3 Total"},{id:"Algebraic",name:"Tier 1 \u2014 Algebraic",desc:"x, x\u207f, \u221a, e, \u03c0, f(x), \u221e, n, log"},{id:"Operational",name:"Tier 2 \u2014 Operational",desc:"\u03a3, \u03a0, n!, nCr, nPr, \u2229, \u222a, P(A), P(A|B), Bayes, Independence"},{id:"Descriptive",name:"Tier 3 \u2014 Descriptive",desc:"x\u0304, \u03bc, \u03c3\u00b2, \u03c3, s/s\u00b2, E(X)"},{id:"Statistical",name:"Tier 4 \u2014 Statistical",desc:"H\u2080, H\u2081, \u03b1, df"}];

const QUESTIONS=[
{tier:"Primordial",type:"Architecture",q:"You see = in a problem. What does the space look like?",a:"Two separate regions with no connection",b:"Two sides holding the same total energy, balanced",c:"A single point collapsing inward",d:"An expanding boundary with no limit",correct:"B",rune:"= \u2014 Equilibrium",exp:"= declares balance. Two sides, same weight. The void at rest \u2014 not absence, but presence held still."},
{tier:"Primordial",type:"Architecture",q:"You see \u00d7 in a problem. What kind of space does it build?",a:"Additive \u2014 things stacking linearly",b:"Proportional \u2014 growth that scales with what's already there",c:"A bounded dome summing to 1",d:"A tree branching into sequential choices",correct:"B",rune:"\u00d7/\u00f7 \u2014 Proportional Transfer",exp:"\u00d7 builds proportional space. The rate depends on what's already present. \u00f7 is the twin \u2014 distribution."},
{tier:"Primordial",type:"Definition",q:"What is = commonly defined as in mathematics?",a:"The symbol declaring two expressions have the same value",b:"The symbol for approximate equality",c:"The symbol for assignment in programming",d:"The symbol for proportionality",correct:"A",rune:"= \u2014 Equilibrium",exp:"= states that the expression on the left and the expression on the right evaluate to the same value."},
{tier:"Primordial",type:"Definition",q:"What does the conservation law (primordial \u03a3) state?",a:"Energy can be created but not destroyed",b:"The total energy in a closed system remains constant \u2014 it changes form but never amount",c:"Every action has an equal and opposite reaction",d:"Systems tend toward maximum disorder",correct:"B",rune:"\u03a3 Total \u2014 Conservation",exp:"Energy transforms but never appears or vanishes. The sum across all forms is always the same."},
{tier:"Primordial",type:"Process",q:"\u03a3 (primordial) \u2014 what does it declare about the system?",a:"The total across all forms never changes",b:"Things accumulate into a sum",c:"The space is bounded to 1",d:"Energy transfers proportionally",correct:"A",rune:"\u03a3 Total \u2014 Conservation",exp:"The primordial \u03a3 is the conservation law \u2014 the one law that never bends."},
{tier:"Primordial",type:"Process",q:"+/\u2212 \u2014 what's the process?",a:"Energy scales proportionally with existing quantity",b:"Energy leaves one place and arrives at another \u2014 total unchanged",c:"Energy accumulates across all forms into a total",d:"Energy reaches equilibrium between two sides",correct:"B",rune:"+/\u2212 \u2014 Transfer",exp:"Transfer is one event felt from two positions. The mountain loses, the river gains."},
{tier:"Primordial",type:"Reverse",q:"Growth that feeds on itself. The bigger the river, the more tributaries it attracts. Rate depends on current size.",a:"+/\u2212 (Transfer)",b:"\u00d7/\u00f7 (Proportional Transfer)",c:"\u03a3 Total (Conservation)",d:"= (Equilibrium)",correct:"B",rune:"\u00d7/\u00f7 \u2014 Proportional Transfer",exp:"\u00d7 is accumulation that feeds on itself \u2014 the rate scales with what's already there."},
{tier:"Primordial",type:"Reverse",q:"Energy leaves one position and arrives at another. One event, two perspectives. The total is always unchanged.",a:"= (Equilibrium)",b:"\u03a3 Total (Conservation)",c:"+/\u2212 (Transfer)",d:"\u00d7/\u00f7 (Proportional Transfer)",correct:"C",rune:"+/\u2212 \u2014 Transfer",exp:"+/\u2212 is the oldest rhythm. Energy departing one place, arriving at another."},
{tier:"Algebraic",type:"Architecture",q:"You see x in a problem. What does it declare?",a:"A fixed constant that never changes",b:"An axis \u2014 a dimension of the space where charge can vary",c:"A boundary limiting the space",d:"A function that transforms input to output",correct:"B",rune:"x \u2014 Potential Charge",exp:"x opens the first axis. It names the dimension \u2014 the amount of potential energy along that axis."},
{tier:"Algebraic",type:"Architecture",q:"You see x\u207f. What's the architecture?",a:"One container with varying charge",b:"n containers bound together, each holding the same charge x \u2014 product read across all",c:"n containers each holding different charges, summed",d:"A single container raised to a variable power",correct:"B",rune:"x\u207f \u2014 Charge Across the Nexus",exp:"x\u207f means the same charge x fills each of n bound containers. The readout is the product across all of them."},
{tier:"Algebraic",type:"Architecture",q:"You see f(x). What's the architecture?",a:"A variable waiting to be solved",b:"A constant embedded in the structure",c:"A chamber \u2014 fixed rule inside, variable input through the opening",d:"An accumulator gathering values",correct:"C",rune:"f(x) \u2014 Saved Spell",exp:"f(x) is a saved spell. The chamber is the rule \u2014 fixed, permanent. The parentheses are the mouth."},
{tier:"Algebraic",type:"Architecture",q:"You see n in a formula. What does it declare?",a:"An unknown to solve for",b:"A count \u2014 how many distinct units are bound together",c:"A continuous flow of energy",d:"An infinite boundary",correct:"B",rune:"n \u2014 Nexus / Binding Force",exp:"n counts. It binds the medium into discrete, distinct units \u2014 each held separate from the others."},
{tier:"Algebraic",type:"Definition",q:"What is e (Euler's number) approximately equal to, and what does it govern?",a:"3.14159 \u2014 the ratio of circumference to diameter",b:"2.71828 \u2014 continuous compound growth",c:"1.61803 \u2014 the golden ratio",d:"0.57721 \u2014 the Euler-Mascheroni constant",correct:"B",rune:"e \u2014 Self-Pullin Growth",exp:"e \u2248 2.71828. Governs continuous growth where the rate equals the current quantity."},
{tier:"Algebraic",type:"Definition",q:"What is x\u207f commonly defined as?",a:"x added to itself n times",b:"x multiplied by itself n times",c:"The nth root of x",d:"x divided by n",correct:"B",rune:"x\u207f \u2014 Charge Across the Nexus",exp:"x\u207f = x \u00d7 x \u00d7 x... (n times). Exponentiation \u2014 repeated multiplication of the same base."},
{tier:"Algebraic",type:"Definition",q:"What is log_b(y) commonly defined as?",a:"The exponent you raise b to in order to get y",b:"The bth root of y",c:"b multiplied by y",d:"y divided by b",correct:"A",rune:"log \u2014 Backtrackin",exp:"log_b(y) = n means b\u207f = y. The inverse of exponentiation."},
{tier:"Algebraic",type:"Process",q:"\u221a \u2014 what does it do to the x\u207f tower?",a:"Returns n (the count) given the product and x",b:"Multiplies the product by the base",c:"Returns x (the charge) given the product and n",d:"Adds the base to the product",correct:"C",rune:"\u221a \u2014 Reverse of x\u207f",exp:"\u221a takes the product and asks backward: what charge must each container have held? \u221a36 = 6."},
{tier:"Algebraic",type:"Process",q:"x\u207f \u2014 what's the construction process?",a:"Add x to itself n times",b:"Multiply x by itself n times \u2014 same charge stacked across n bound containers",c:"Divide x into n equal parts",d:"Take the nth root of x",correct:"B",rune:"x\u207f \u2014 Charge Across the Nexus",exp:"x \u00d7 x \u00d7 x... n times. Each container holds the same charge. The product is the readout."},
{tier:"Algebraic",type:"Process",q:"log \u2014 what does it do to the x\u207f tower?",a:"Returns the charge x given the product and n",b:"Returns n (the count) given the product and the base x",c:"Doubles the product",d:"Squares the base",correct:"B",rune:"log \u2014 Backtrackin",exp:"log takes the product and the base, and gives back the count. How many containers?"},
{tier:"Algebraic",type:"Reverse",q:"No walls. No boundary. Always more. Always further. A direction, not a number.",a:"\u03a3 Total (Conservation)",b:"\u03c0 (Circularity)",c:"\u221e (Unboundedness)",d:"n (Nexus)",correct:"C",rune:"\u221e \u2014 Unboundedness",exp:"\u221e is not a number \u2014 it's a property. The direction of never ending."},
{tier:"Algebraic",type:"Reverse",q:"The ratio that appears automatically whenever something curves back into itself. Not doing \u2014 just being. Baked into the shape.",a:"e (Self-Pullin Growth)",b:"\u03c0 (Signature of Circularity)",c:"\u221e (Unboundedness)",d:"n (Nexus)",correct:"B",rune:"\u03c0 \u2014 Signature of Circularity",exp:"\u03c0 \u2248 3.14159. The void's geometry law. When anything curves back into itself, \u03c0 is already there."},
{tier:"Algebraic",type:"Reverse",q:"A chamber with a fixed rule inside. You send a charge through the opening and get a result. The rule is saved \u2014 use it as many times as you need.",a:"x (Potential Charge)",b:"n (Nexus)",c:"f(x) (Saved Spell)",d:"x\u207f (Charge Across Nexus)",correct:"C",rune:"f(x) \u2014 Saved Spell",exp:"f(x) is a stored formula. Galdr it once, it stands in the void. Send charges through as many times as you need."},
{tier:"Algebraic",type:"Reverse",q:"Growth where the intake rate equals the current amount. Continuous, smooth, self-feeding. The escalator, not the staircase.",a:"x\u207f (Charge Across Nexus)",b:"\u03c0 (Signature of Circularity)",c:"\u00d7 (Proportional Transfer)",d:"e (Self-Pullin Growth)",correct:"D",rune:"e \u2014 Self-Pullin Growth",exp:"e \u2248 2.718. The force where the intake rate equals the current amount. Continuous compound growth."},
{tier:"Operational",type:"Architecture",q:"You see P in a problem. What does the space look like?",a:"An unbounded line extending infinitely",b:"A bounded dome \u2014 everything inside sums to 1, 100%",c:"A tree branching into sequential paths",d:"A single axis with one variable",correct:"B",rune:"P(A) \u2014 Probability",exp:"P sets the dome. The whole space is 1. Every event has a density between 0 and 1."},
{tier:"Operational",type:"Architecture",q:"You see \u2229 with two sets A and B. What's the architecture?",a:"Everything from both sets gathered together",b:"A tree with sequential branches",c:"A square with four rooms \u2014 two axes crossing, each running to 100%",d:"A single line where A and B sit at different points",correct:"C",rune:"\u2229 \u2014 Intersection",exp:"\u2229 with two sets creates a 2\u00d72 space: four rooms in a square. Two axes crossing. All four rooms sum to the whole dome."},
{tier:"Operational",type:"Architecture",q:"You see n! in a problem. What's the architecture?",a:"A pool of n distinct items, all leaving in sequence \u2014 every position matters",b:"A selection of r items from n, order doesn't matter",c:"n containers each holding the same charge",d:"A bounded dome summing to 1",correct:"A",rune:"n! \u2014 Factorial",exp:"n! is full ordered departure. The entire pool empties one at a time. n choices, then n-1, then n-2... down to 1."},
{tier:"Operational",type:"Architecture",q:"You see nPr. What's the architecture?",a:"Full pool empties \u2014 all n leave in sequence",b:"Partial pool \u2014 r leave from n, and the order they leave matters",c:"Partial pool \u2014 r leave from n, order doesn't matter",d:"A product of all values multiplied together",correct:"B",rune:"nPr \u2014 Permutations",exp:"nPr is partial ordered departure. r items leave the pool of n, one at a time. Who left first is not who left second."},
{tier:"Operational",type:"Architecture",q:"You see nCr. What's the architecture compared to nPr?",a:"Same as nPr but with an additional ordering step",b:"Same as nPr but you divide out the r! orderings \u2014 who's in the group, not who left first",c:"Completely different \u2014 nCr uses addition, nPr uses multiplication",d:"nCr includes replacement, nPr doesn't",correct:"B",rune:"nCr \u2014 Combinations",exp:"nCr = nPr / r!. Same departure, but collapse all r! orderings of the same group into one."},
{tier:"Operational",type:"Architecture",q:"You see \u03a3 (operational) in a formula. What does it declare?",a:"Replication \u2014 each value multiplied by every other",b:"Accumulation \u2014 scattered things gathered into one total",c:"A bounded dome summing to 1",d:"A sequential departure from a pool",correct:"B",rune:"\u03a3 \u2014 Summation",exp:"\u03a3 is collapse inward. Many become one. All values release from their containers and accumulate into a single total."},
{tier:"Operational",type:"Architecture",q:"You see \u03a0 in a formula. What does it declare compared to \u03a3?",a:"\u03a3 gathers by addition (collapse), \u03a0 gathers by multiplication (replication)",b:"\u03a3 and \u03a0 are identical operations",c:"\u03a0 is subtraction, \u03a3 is addition",d:"\u03a0 is for probabilities only, \u03a3 is for everything else",correct:"A",rune:"\u03a0 \u2014 Product",exp:"\u03a3 collapses additively. \u03a0 replicates multiplicatively \u2014 each value reaches into every other. If any factor is 0, the whole product dies."},
{tier:"Operational",type:"Definition",q:"What is P(A) commonly defined as?",a:"The number of outcomes in A divided by the total number of outcomes in the sample space",b:"The intersection of A with the complement of B",c:"The sum of all values in A",d:"The average of A's outcomes",correct:"A",rune:"P(A) \u2014 Probability",exp:"P(A) = |A|/|\u03a9| for equally likely outcomes. The fraction of the sample space that A occupies."},
{tier:"Operational",type:"Definition",q:"What is P(A|B) commonly defined as?",a:"P(A) + P(B) \u2212 P(A\u2229B)",b:"P(A\u2229B) / P(B)",c:"P(A) \u00d7 P(B)",d:"P(B|A) \u00d7 P(A)",correct:"B",rune:"P(A|B) \u2014 Conditional",exp:"P(A|B) = P(A\u2229B)/P(B). The probability of A given B. You restrict to the world where B happened."},
{tier:"Operational",type:"Definition",q:"What is n! commonly defined as?",a:"n \u00d7 (n-1) \u00d7 (n-2) \u00d7 ... \u00d7 1",b:"n \u00d7 r",c:"n / (n-r)",d:"The sum of integers from 1 to n",correct:"A",rune:"n! \u2014 Factorial",exp:"n! = n \u00d7 (n-1) \u00d7 (n-2) \u00d7 ... \u00d7 1. The product of all positive integers up to n."},
{tier:"Operational",type:"Definition",q:"What does it mean for A and B to be independent?",a:"P(A\u2229B) = 0",b:"P(A\u2229B) = P(A) \u00d7 P(B)",c:"P(A\u222aB) = P(A) + P(B)",d:"P(A|B) > P(A)",correct:"B",rune:"Independence",exp:"A and B are independent when P(A\u2229B) = P(A)\u00b7P(B). Knowing B gives no information about A."},
{tier:"Operational",type:"Process",q:"P(A|B) \u2014 what's the construction sequence?",a:"Measure A in the full space \u03a9",b:"Find where A and B overlap, then expand",c:"Shrink the dome to B first, then measure A's density inside the smaller dome \u2014 two moves, that order",d:"Multiply P(A) by P(B)",correct:"C",rune:"P(A|B) \u2014 Conditional",exp:"P(A|B) = P(A\u2229B)/P(B). B becomes your new dome. Inside that smaller dome, how much is also A?"},
{tier:"Operational",type:"Process",q:"\u222a \u2014 what's the construction sequence?",a:"Find where A and B overlap \u2014 one move",b:"Shrink the dome to B, then measure A inside it \u2014 two moves",c:"Expand A, expand B, subtract the overlap \u2014 three moves",d:"Multiply A by B \u2014 one move",correct:"C",rune:"\u222a \u2014 Union",exp:"\u222a is gathering. Take everything in A, everything in B, but the overlap got counted twice \u2014 subtract it back."},
{tier:"Operational",type:"Process",q:"\u2229 \u2014 what's the construction sequence?",a:"Expand A, expand B, subtract overlap",b:"Find where A and B are both true at once \u2014 the overlap region",c:"Shrink the dome to A, then measure B",d:"Add everything from A and B together",correct:"B",rune:"\u2229 \u2014 Intersection",exp:"\u2229 is constraining. What's in both rooms at once? One move \u2014 find the overlap."},
{tier:"Operational",type:"Process",q:"Bayes \u2014 what's the construction sequence?",a:"You know P(B|A). You flip the conditional \u2014 reverse the anchor from A to B using P(A) and P(B)",b:"You add P(A) and P(B) and divide by 2",c:"You find the union of A and B",d:"You check if A and B are independent",correct:"A",rune:"Bayes \u2014 Reversal Galdr",exp:"Bayes flips a known conditional. P(A|B) = P(B|A)\u00b7P(A)/P(B). Same intersection, different anchor."},
{tier:"Operational",type:"Process",q:"n! \u2014 what's the construction sequence?",a:"Pick r from n, order matters",b:"Pick r from n, order doesn't matter",c:"Full pool empties one at a time. n choices, then n-1, then n-2... down to 1. Every step shrinks the pool",d:"Each item is multiplied by every other item",correct:"C",rune:"n! \u2014 Factorial",exp:"n! is active migration. The pool empties completely, one energy at a time, into a sequence."},
{tier:"Operational",type:"Process",q:"\u03a3 (operational) \u2014 what's the construction sequence?",a:"Each value replicates against every other \u2014 proliferation",b:"All values release from their containers and collapse inward to one total \u2014 many become one",c:"Values are distributed evenly across channels",d:"Values are squared and then summed",correct:"B",rune:"\u03a3 \u2014 Summation",exp:"\u03a3 is collapse. Many become one. All separations collapse inward."},
{tier:"Operational",type:"Reverse",q:"The dome shrinks to a smaller space. Inside that smaller dome, you measure density. Two moves, always in that order.",a:"P(A) (Probability)",b:"\u2229 (Intersection)",c:"\u222a (Union)",d:"P(A|B) (Conditional)",correct:"D",rune:"P(A|B) \u2014 Conditional",exp:"P(A|B) shrinks \u03a9 to B. B becomes the new dome. Inside the smaller dome, measure A's density."},
{tier:"Operational",type:"Reverse",q:"You know how a cause produces evidence. Now you need to diagnose the cause from observed evidence. Flip the direction.",a:"P(A|B) (Conditional)",b:"Independence",c:"Bayes (Reversal)",d:"\u222a (Union)",correct:"C",rune:"Bayes \u2014 Reversal Galdr",exp:"Bayes reverses a known conditional. Same data, different anchor point."},
{tier:"Operational",type:"Reverse",q:"Knowing B happened tells you nothing new about A. The density of A is the same whether you're inside B or in the full space.",a:"P(A|B) (Conditional)",b:"Bayes (Reversal)",c:"\u222a (Union)",d:"Independence",correct:"D",rune:"Independence",exp:"A and B are independent when P(A|B) = P(A). Collapsing down to B didn't change A's density."},
{tier:"Operational",type:"Reverse",q:"If any single factor is zero, the entire result collapses to zero. One dead channel breaks the chain. Replication with built-in fragility.",a:"\u03a3 (Summation)",b:"n! (Factorial)",c:"\u03a0 (Product)",d:"\u2229 (Intersection)",correct:"C",rune:"\u03a0 \u2014 Product",exp:"\u03a0 is multiplicative chaining. If any x\u1d62 = 0, everything dies. Built-in fragility."},
{tier:"Operational",type:"Reverse",q:"Pool empties partially. r leave from n, one at a time. Who left first matters \u2014 it's not the same as who left second.",a:"n! (Factorial)",b:"nCr (Combinations)",c:"\u03a0 (Product)",d:"nPr (Permutations)",correct:"D",rune:"nPr \u2014 Permutations",exp:"nPr is partial ordered departure. r leave from n, sequence matters."},
{tier:"Operational",type:"Reverse",q:"Same partial departure, but now collapse all r! orderings of the same group into one. Who's in the group, not who left first.",a:"nPr (Permutations)",b:"n! (Factorial)",c:"nCr (Combinations)",d:"\u03a3 (Summation)",correct:"C",rune:"nCr \u2014 Combinations",exp:"nCr collapses all r! orderings of the same r departures into one. Subsets, not sequences."},
{tier:"Descriptive",type:"Architecture",q:"You see x\u0304 in a formula. What's the architecture?",a:"All possible outcomes weighted by probability",b:"A finite handful of values \u2014 summed and redistributed evenly across n stones",c:"The entire population measured at once",d:"The squared distance from center",correct:"B",rune:"x\u0304 \u2014 Sample Mean",exp:"x\u0304 = (\u03a3x\u1d62)/n. A finite sample \u2014 not the whole population. Sum them, divide evenly."},
{tier:"Descriptive",type:"Architecture",q:"You see \u03c3\u00b2 in a formula. What's the architecture?",a:"Average distance from center in original units",b:"Stand at the mean, measure each distance, square it, average over all \u2014 lives in squared units",c:"Sum all values and divide by n",d:"Weighted sum of all outcomes by probability",correct:"B",rune:"\u03c3\u00b2 \u2014 Variance",exp:"\u03c3\u00b2 = \u03a3(x\u1d62\u2212\u03bc)\u00b2/N. Stand at the mean. Square each rope. Average over all. Lives in squared units."},
{tier:"Descriptive",type:"Definition",q:"What is x\u0304 commonly defined as?",a:"The sum of all sample values divided by n",b:"The sum of all population values divided by N",c:"The weighted sum of outcomes times probabilities",d:"The square root of variance",correct:"A",rune:"x\u0304 \u2014 Sample Mean",exp:"x\u0304 = (\u03a3x\u1d62)/n. The arithmetic average of a sample."},
{tier:"Descriptive",type:"Definition",q:"What is \u03c3 commonly defined as?",a:"The average of all values",b:"The square root of the variance \u2014 average distance from the mean in original units",c:"The sum of squared deviations",d:"The weighted average of outcomes",correct:"B",rune:"\u03c3 \u2014 Standard Deviation",exp:"\u03c3 = \u221a\u03c3\u00b2. Measures the typical spread around the mean, in the same units as the data."},
{tier:"Descriptive",type:"Definition",q:"What is the difference between \u03bc and x\u0304?",a:"\u03bc is for samples, x\u0304 is for populations",b:"\u03bc is the population mean (all N), x\u0304 is the sample mean (a subset of n)",c:"They are identical",d:"\u03bc is the median, x\u0304 is the mean",correct:"B",rune:"\u03bc vs x\u0304",exp:"\u03bc covers the entire population. x\u0304 covers a finite sample. Same formula, different pool size."},
{tier:"Descriptive",type:"Process",q:"\u03c3 \u2014 what's the construction process?",a:"Sum all values, divide by n",b:"Compute the variance (\u03c3\u00b2), then take the square root \u2014 return to original units",c:"Multiply each value by its probability",d:"Find the median of the distribution",correct:"B",rune:"\u03c3 \u2014 Standard Deviation",exp:"\u03c3 = \u221a\u03c3\u00b2. The square root of variance returns the spread to original units."},
{tier:"Descriptive",type:"Process",q:"E(X) \u2014 what's the construction process?",a:"Sum all values and divide by n",b:"Place every possible outcome on a line, weight each by its probability, find the balance point",c:"Take the square root of the variance",d:"Count the number of outcomes",correct:"B",rune:"E(X) \u2014 Centre-of-Gravity Galdr",exp:"E(X) = \u03a3 x\u1d62\u00b7P(X=x\u1d62). Weighted sum of all possible outcomes. The balance point."},
{tier:"Descriptive",type:"Process",q:"s\u00b2 (sample variance) \u2014 how does it differ from \u03c3\u00b2?",a:"s\u00b2 uses n, \u03c3\u00b2 uses n-1",b:"s\u00b2 divides by n-1 because one degree of freedom was spent estimating x\u0304 \u2014 finite sight correction",c:"s\u00b2 uses the population mean, \u03c3\u00b2 uses the sample mean",d:"There is no difference",correct:"B",rune:"s\u00b2 \u2014 Sample Variance",exp:"s\u00b2 = \u03a3(x\u1d62\u2212x\u0304)\u00b2/(n-1). x\u0304 cost a degree of freedom \u2014 n-1 corrects for that binding."},
{tier:"Descriptive",type:"Reverse",q:"Weighted sum of all possible outcomes, where the weights are probabilities. The balance point. Reduces to ordinary average when outcomes are equally likely.",a:"\u03bc (Population Mean)",b:"x\u0304 (Sample Mean)",c:"\u03c3\u00b2 (Variance)",d:"E(X) (Expected Value)",correct:"D",rune:"E(X) \u2014 Expected Value",exp:"E(X) is the expectation \u2014 the center of gravity of weighted outcomes."},
{tier:"Descriptive",type:"Reverse",q:"Every stone in the entire population \u2014 all of them \u2014 summed and redistributed evenly across N.",a:"x\u0304 (Sample Mean)",b:"E(X) (Expected Value)",c:"\u03bc (Population Mean)",d:"\u03c3 (Standard Deviation)",correct:"C",rune:"\u03bc \u2014 Population Mean",exp:"\u03bc = (\u03a3x\u1d62)/N. The entire field, not a subset. Same recipe as x\u0304, but the pool is the full population."},
{tier:"Statistical",type:"Architecture",q:"You see H\u2080 in a hypothesis test. What does it declare?",a:"The claim you're trying to prove",b:"The flat default posture \u2014 status quo, assumed true until evidence forces you away",c:"The significance threshold",d:"The number of free data points",correct:"B",rune:"H\u2080 \u2014 Null Hypothesis",exp:"H\u2080 is the default. Status quo. No effect, no difference. You assume it's true until evidence is strong enough to reject it."},
{tier:"Statistical",type:"Architecture",q:"You see \u03b1 in a hypothesis test. What does it declare?",a:"The null hypothesis",b:"The alternative hypothesis",c:"The pre-set threshold \u2014 how much risk of false rejection you'll tolerate",d:"The degrees of freedom",correct:"C",rune:"\u03b1 \u2014 Significance Level",exp:"\u03b1 is the filter threshold. Usually 0.05. The maximum probability of rejecting H\u2080 when it's actually true."},
{tier:"Statistical",type:"Definition",q:"What is \u03b1 commonly defined as in hypothesis testing?",a:"The probability of the data given H\u2080 is true",b:"The maximum probability of rejecting H\u2080 when it's actually true (Type I error rate)",c:"The probability that H\u2081 is correct",d:"The sample size divided by the population size",correct:"B",rune:"\u03b1 \u2014 Significance Level",exp:"\u03b1 is the Type I error rate \u2014 the risk you accept of falsely rejecting a true H\u2080. Typically 0.05."},
{tier:"Statistical",type:"Definition",q:"What is H\u2080 commonly defined as?",a:"The hypothesis the researcher hopes to prove",b:"The default assumption of no effect or no difference, assumed true until evidence says otherwise",c:"The significance level for the test",d:"The alternative to the research hypothesis",correct:"B",rune:"H\u2080 \u2014 Null Hypothesis",exp:"H\u2080 is the null hypothesis \u2014 the default position of no effect, no change, no difference."},
{tier:"Statistical",type:"Process",q:"Hypothesis testing \u2014 what's the sequence?",a:"Set H\u2081 first, then find data to confirm it",b:"Set H\u2080 (default), set \u03b1 (threshold), collect evidence, compute p-value, compare p to \u03b1 \u2014 reject H\u2080 only if p < \u03b1",c:"Calculate the mean and reject if it's unusual",d:"Set \u03b1 after seeing the data to get the result you want",correct:"B",rune:"Hypothesis Testing Sequence",exp:"The sequence is fixed: default first (H\u2080), threshold second (\u03b1), evidence third, comparison last."},
{tier:"Statistical",type:"Process",q:"df \u2014 what does it do in a t-test?",a:"Sets the significance level",b:"Determines the shape of the t-distribution \u2014 more df means slimmer tails, closer to normal",c:"Counts the total sample size",d:"Defines the null hypothesis",correct:"B",rune:"df \u2014 Degrees of Freedom",exp:"df shapes the t-distribution. Low df = fat tails (more uncertainty). High df = slim tails (closer to the normal curve)."},
{tier:"Statistical",type:"Reverse",q:"10 data points. 1 spent estimating the mean. 9 remain free to vary. What concept is this?",a:"\u03b1 (Significance Level)",b:"H\u2080 (Null Hypothesis)",c:"H\u2081 (Alternative Hypothesis)",d:"df (Degrees of Freedom)",correct:"D",rune:"df \u2014 Degrees of Freedom",exp:"df = n \u2212 (parameters estimated). 10 points, 1 spent on x\u0304 \u2192 df = 9."},
{tier:"Statistical",type:"Reverse",q:"The claim that replaces the default when evidence is strong enough. The challenger. You never accept it directly \u2014 you reject the default in its favor.",a:"H\u2080 (Null Hypothesis)",b:"\u03b1 (Significance Level)",c:"H\u2081 (Alternative Hypothesis)",d:"df (Degrees of Freedom)",correct:"C",rune:"H\u2081 \u2014 Alternative Hypothesis",exp:"H\u2081 is the challenger. You don't accept H\u2081 directly \u2014 you reject H\u2080 in its favor when the evidence is strong enough."}
];

let activeType="all";
let currentTier=null;
let currentQuestions=[];
let currentIndex=0;
let answers=[];

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function show(screen){document.getElementById("screen-picker").classList.add("hidden");document.getElementById("screen-quiz").classList.add("hidden");document.getElementById("screen-results").classList.add("hidden");document.getElementById("screen-"+screen).classList.remove("hidden");window.scrollTo(0,0);}

function getFiltered(tierId){let qs=QUESTIONS;if(tierId&&tierId!=="all")qs=qs.filter(q=>q.tier===tierId);if(activeType!=="all")qs=qs.filter(q=>q.type===activeType);return qs;}

function renderTierGrid(){const grid=document.getElementById("chapter-grid");grid.innerHTML="";TIERS.forEach(t=>{const count=getFiltered(t.id).length;const card=document.createElement("button");card.className="chapter-card";if(count===0)card.style.opacity="0.4";card.innerHTML=`<div class="chapter-card-header"><h3>${t.name}</h3><span class="chapter-card-weight">${count} questions</span></div><div class="chapter-card-meta">${t.desc}</div>`;card.addEventListener("click",()=>{if(count>0)startTier(t);});grid.appendChild(card);});const totalCount=getFiltered("all").length;document.getElementById("shuffle-all-btn").textContent=`\u2605 Shuffle all ${totalCount} questions`;}

document.getElementById("type-filters").addEventListener("click",e=>{const btn=e.target.closest(".filter-btn");if(!btn)return;document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");activeType=btn.dataset.type;renderTierGrid();});

function startTier(t){currentTier=t;currentQuestions=shuffle(getFiltered(t.id));currentIndex=0;answers=currentQuestions.map(()=>null);show("quiz");renderQuestion();}

function startAll(){currentTier={id:"all",name:"All tiers \u2014 Shuffle"};currentQuestions=shuffle(getFiltered("all"));currentIndex=0;answers=currentQuestions.map(()=>null);show("quiz");renderQuestion();}

document.getElementById("shuffle-all-btn").addEventListener("click",startAll);

function renderQuestion(){const q=currentQuestions[currentIndex];document.getElementById("quiz-chapter-name").textContent=currentTier.name;document.getElementById("quiz-progress-text").textContent=`${currentIndex+1} / ${currentQuestions.length}`;document.getElementById("progress-bar-fill").style.width=`${((currentIndex+1)/currentQuestions.length)*100}%`;document.getElementById("question-tag").textContent=`${q.tier} \u00b7 ${q.type}`;document.getElementById("question-text").textContent=q.q;const optionsDiv=document.getElementById("options");optionsDiv.innerHTML="";["a","b","c","d"].forEach((key,i)=>{const letter=["A","B","C","D"][i];const btn=document.createElement("button");btn.className="option-btn";btn.innerHTML=`<span class="option-letter">${letter}</span> ${esc(q[key])}`;btn.addEventListener("click",()=>selectAnswer(letter));optionsDiv.appendChild(btn);});document.getElementById("explanation").classList.add("hidden");document.getElementById("next-btn").classList.add("hidden");if(answers[currentIndex]!==null)showAnswer(answers[currentIndex].selected,q);}

function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]);}

function selectAnswer(letter){const q=currentQuestions[currentIndex];const isCorrect=letter===q.correct;answers[currentIndex]={selected:letter,correct:isCorrect};showAnswer(letter,q);}

function showAnswer(selected,q){const buttons=document.querySelectorAll(".option-btn");buttons.forEach((btn,i)=>{const letter=["A","B","C","D"][i];btn.disabled=true;if(letter===q.correct)btn.classList.add("correct");else if(letter===selected)btn.classList.add("wrong");});const exp=document.getElementById("explanation");const isCorrect=selected===q.correct;exp.innerHTML=`<strong>${isCorrect?"Correct.":"Wrong."}</strong> <em>${esc(q.rune)}</em> \u2014 ${esc(q.exp)}`;exp.classList.remove("hidden");const nextBtn=document.getElementById("next-btn");nextBtn.textContent=currentIndex===currentQuestions.length-1?"See results \u2192":"Next \u2192";nextBtn.classList.remove("hidden");}

document.getElementById("next-btn").addEventListener("click",()=>{if(currentIndex===currentQuestions.length-1)showResults();else{currentIndex++;renderQuestion();}});

function showResults(){const correctCount=answers.filter(a=>a&&a.correct).length;const total=currentQuestions.length;const pct=Math.round((correctCount/total)*100);document.getElementById("results-chapter-label").textContent=currentTier.name;document.getElementById("score-number").textContent=`${correctCount} / ${total}`;document.getElementById("score-label").textContent=`${pct}% correct`;const grid=document.getElementById("squares-grid");grid.innerHTML="";answers.forEach((a,i)=>{const sq=document.createElement("button");sq.className=`square ${a&&a.correct?"right":"wrong"}`;sq.textContent=i+1;sq.title=`Question ${i+1}`;sq.addEventListener("click",()=>{currentIndex=i;show("quiz");renderQuestion();});grid.appendChild(sq);});const wrong=total-correctCount;const chart=document.getElementById("mermaid-chart");chart.removeAttribute("data-processed");chart.textContent=`pie showData\n    title Result\n    "Correct" : ${correctCount}\n    "Wrong" : ${wrong}`;show("results");if(window.mermaid){try{mermaid.run({nodes:[chart]});}catch(e){mermaid.init(undefined,chart);}}}

document.getElementById("retry-btn").addEventListener("click",()=>{if(currentTier.id==="all")startAll();else startTier(currentTier);});
document.getElementById("back-btn").addEventListener("click",()=>show("picker"));

if(window.mermaid){mermaid.initialize({startOnLoad:false,theme:"dark",themeVariables:{background:"#18181b",primaryColor:"#22c55e",primaryTextColor:"#fafafa",pie1:"#22c55e",pie2:"#ef4444"}});}
renderTierGrid();
</script>
</body>
</html>
